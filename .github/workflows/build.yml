name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java toolchains
        uses: actions/setup-java@v4
        with:
          java-version: |
            8
            17
            21
          distribution: 'zulu'

      - name: Configure Gradle toolchain discovery
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          {
            echo "org.gradle.java.installations.auto-download=false"
            echo "org.gradle.java.installations.fromEnv=JAVA_HOME_8_X64,JAVA_HOME_17_X64,JAVA_HOME_21_X64"
          } >> "$HOME/.gradle/gradle.properties"

      - name: Verify active Java
        run: java -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: bash ./gradlew build
